<h1>📊 Mood Tracker</h1>

<p>How do you feel today?</p>

<button onclick="logMood(1)">😞</button>
<button onclick="logMood(2)">😐</button>
<button onclick="logMood(3)">🙂</button>
<button onclick="logMood(4)">😄</button>

<canvas id="moodChart"></canvas>

<script src="script.js"></script>

<script>

function logMood(mood){

player.moodHistory.push(mood);

addXP(5);

saveGame();

drawChart();

}

function drawChart(){

let ctx = document.getElementById("moodChart");

new Chart(ctx,{
type:"line",
data:{
labels: player.moodHistory.map((_,i)=>"Day "+(i+1)),
datasets:[{
label:"Mood",
data:player.moodHistory
}]
}
});

}

drawChart();

</script>
