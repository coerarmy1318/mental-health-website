<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">

<!-- 🌌 HERO SECTION -->
<section class="hero text-center d-flex align-items-center justify-content-center">

        <p class="lead">Track your mood. Complete challenges. Unlock badges.</p>

<!-- 🎮 GAME SECTION -->
<div class="container text-center my-5">

    <div class="row g-4">

        <!-- Mood Card -->
        <div class="col-md-4">
            <div class="card game-card p-4">
                <h4>How are you feeling?</h4>
                <button class="btn mood-btn"> Happy</button>
                <button class="btn mood-btn"> Okay</button>
                <button class="btn mood-btn"> sad</button>
            </div>
        </div>

        <!-- Challenge Card -->
        <div class="col-md-4">
            <div class="card game-card p-4">
                <h4>Daily Challenge 🎯</h4>
                <p>Take 5 deep breaths today 🌬️</p>
                <button class="btn mood-btn">Complete</button>
            </div>
        </div>

        <!-- Badge Card -->
        <div class="col-md-4">
            <div class="card game-card p-4">
                <h4>🏆 Badges</h4>
                <p>No badges yet...</p>
            </div>
        </div>

    </div>
</div>
